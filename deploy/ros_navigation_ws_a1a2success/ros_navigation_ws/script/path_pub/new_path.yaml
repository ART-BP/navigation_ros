move_base_action: /move_base
teb_reconfigure_ns: /move_base/TebLocalPlannerROS
stair_mode_topic: /stair_mode
stair_publish_rate: 10.0
dynamic_reconfigure_timeout: 5.0
wait_server_timeout: 10.0
goal_timeout: 120.0
continue_on_failure: false
frame_id: map

# For normal waypoints, send the next goal once the robot is this close.
# Stair waypoints and the final waypoint still wait for the goal result.
near_goal_advance_distance: 3.0
advance_check_rate: 5.0

# If a sent goal fails and the robot is still farther than failure_retry_distance,
# retry it this many extra times before advancing to the next waypoint.
failure_retry_distance: 3.0
failure_retry_count: 2
robot_base_frame: base_link
pose_lookup_timeout: 0.1

# Most waypoints are normal. Mark only the stair targets here.
# Indices are 1-based by default: waypoint #2 below is the stair segment.
stair_index_base: 1
stair_indices: []

stair_teb_params:
  max_vel_x: 0.65
  max_vel_theta: 0.22
  acc_lim_x: 0.70
  acc_lim_theta: 0.45
  weight_kinematics_forward_drive: 900.0
  weight_optimaltime: 0.5
  weight_viapoint: 8.0

waypoints:
  - [-6.73, 3.85, 0.0]
  - [-5.42, 4.5, 0.0]
  - [-3.70, 4.0, 0.0]
  - [2.84, 3.46, 0.0]
  - [4.1, 0.2, 0.0]
